<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 250" role="img" aria-label="The Reply Guys tab pinned to the right edge of the page. Click the sparkle tab to open the side panel.">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#1a1745" flood-opacity="0.12"/>
    </filter>
    <filter id="fabGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <linearGradient id="fabFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Site window (X, Farcaster or Binance Square) -->
  <g filter="url(#softShadow)">
    <rect x="24" y="30" width="512" height="190" rx="18" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
  </g>
  <circle cx="52" cy="56" r="5" fill="#e2e8f0"/>
  <circle cx="70" cy="56" r="5" fill="#e2e8f0"/>
  <circle cx="88" cy="56" r="5" fill="#e2e8f0"/>
  <rect x="120" y="49" width="300" height="14" rx="7" fill="#f1f5f9"/>
  <rect x="52" y="90" width="430" height="40" rx="10" fill="#f8fafc" stroke="#eef2ff" stroke-width="1"/>
  <rect x="66" y="102" width="150" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="66" y="116" width="270" height="7" rx="3.5" fill="#eef2ff"/>
  <rect x="52" y="144" width="430" height="52" rx="10" fill="#f8fafc" stroke="#eef2ff" stroke-width="1"/>
  <rect x="66" y="156" width="120" height="8" rx="4" fill="#e2e8f0"/>
  <rect x="66" y="170" width="300" height="7" rx="3.5" fill="#eef2ff"/>
  <rect x="66" y="182" width="220" height="7" rx="3.5" fill="#eef2ff"/>

  <!-- The launcher tab, pinned to the right edge of the window -->
  <ellipse cx="536" cy="127" rx="30" ry="38" fill="#facc15" opacity="0.38" filter="url(#fabGlow)"/>
  <rect x="510" y="98" width="52" height="58" rx="16" fill="url(#fabFill)"/>
  <!-- white sparkle glyph (Reply Guys mark) -->
  <g transform="translate(521,112) scale(1.25)">
    <path d="M12 1 C12.5 7 13 8 23 12 C13 16 12.5 17 12 23 C11.5 17 11 16 1 12 C11 8 11.5 7 12 1 Z" fill="#ffffff"/>
  </g>
  <!-- gold corner dot -->
  <circle cx="551" cy="110" r="4.5" fill="#facc15"/>

  <!-- callout, well clear of the tab -->
  <path d="M712 134 C660 128 616 129 582 130" fill="none" stroke="#a5b0fc" stroke-width="2" stroke-dasharray="4 5" stroke-linecap="round"/>
  <path d="M588 124 l-9 6 l9 6" fill="none" stroke="#8189f8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="852" y="124" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="16" font-weight="700" fill="#1e293b" text-anchor="end">Reply Guys tab</text>
  <text x="852" y="147" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="13" fill="#64748b" text-anchor="end">click to open the panel</text>
</svg>
